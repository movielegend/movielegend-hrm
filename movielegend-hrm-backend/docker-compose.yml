services:
  postgres:
    image: postgres:16-alpine
    container_name: movielegend_hrm_postgres
    environment:
      POSTGRES_DB: movielegend_hrm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - movielegend_hrm_pgdata:/var/lib/postgresql/data

volumes:
  movielegend_hrm_pgdata:
